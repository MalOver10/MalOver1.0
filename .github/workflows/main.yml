name: Flet APK Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # Flet'in hata mesajında istediği tam sürüm:
          flutter-version: '3.24.4' 
          # Not: GitHub Actions'da 3.41 henüz olmayabilir, 
          # ama 3.24+ genellikle Flet 0.84'ü susturur. 
          # Eğer yine sürüm isterse 'any' yapıp en yenisini çektireceğiz.

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install Flet
        run: |
          pip install flet requests certifi
          
      - name: Build APK (Susturucu Modu)
        run: |
          # 'yes' komutu ile tüm sorulara otomatik 'y' diyoruz
          # '--no-interaction' bayrağı da varsa soruyu engeller
          yes | flet build apk --verbose
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: malo-apk
          path: build/apk/*.apk
